name: Watchdog

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check last run
        run: |
          if [ ! -f last_run.txt ]; then
            echo "STALE=true" >> $GITHUB_ENV
            exit 0
          fi

          NOW=$(date +%s)
          LAST=$(cat last_run.txt)
          DIFF=$((NOW-LAST))

          echo "Seconds since last run: $DIFF"

          if [ $DIFF -gt 86400 ]; then
            echo "STALE=true" >> $GITHUB_ENV
          fi

      - name: Send mail
        if: env.STALE == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          subject: "GitHub cron se danes ni izvedel"
          to: majda.janezic@gmail.com
          from: majda.janezic@gmail.com
          body: "Daily workflow danes ni osvežil podatkov."
