name: Run python daily

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install requests beautifulsoup4 openpyxl

      - name: Run FundNavRSDECL.py (retry 3x)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i for FundNavRSDECL.py"
            if python FundNavRSDECL.py; then
              echo "FundNavRSDECL.py succeeded on attempt $i"
              break
            fi

            if [ "$i" -lt 3 ]; then
              echo "Failed... retrying in 60s"
              sleep 60
            else
              echo "FundNavRSDECL.py failed after 3 attempts"
              exit 1
            fi
          done

      - name: Save refresh timestamp
        if: success()
        run: date +%s > last_run.txt

      - name: Commit updated CSV file
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          [ -f FundNavRSDECL_master_history.csv ] && git add FundNavRSDECL_master_history.csv
          git add last_run.txt

          git diff --cached --quiet || git commit -m "Update fund history"
          git push
