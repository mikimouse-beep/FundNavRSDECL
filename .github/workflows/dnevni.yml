name: Run python daily

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          pip install requests beautifulsoup4 openpyxl

      - name: Run Ec.py
        run: python Ec.py

      - name: Run Ec1.py
        run: python Ec1.py

      - name: Run FundNavRSDECL.py
        run: python FundNavRSDECL.py


      - name: Commit updated CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          [ -f ecl_rsd_cash_history.csv ] && git add ecl_rsd_cash_history.csv
          [ -f ecl_euro_cash_history.csv ] && git add ecl_euro_cash_history.csv
          [ -f FundNavRSDECL_master_history.csv ] && git add FundNavRSDECL_master_history.csv

          git diff --cached --quiet || git commit -m "Update fund history CSV files"
          git push
